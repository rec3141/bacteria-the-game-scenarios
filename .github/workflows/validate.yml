name: Validate scenarios
on:
  workflow_dispatch:
  push:
    paths: ['scenarios/**', 'scripts/**', 'index.json']
  pull_request:
    paths: ['scenarios/**', 'scripts/**', 'index.json']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-all.mjs
      - run: node scripts/selftest.mjs
      # defaults.json, params.json and validator.mjs are all derived from the game's game.js. They
      # were kept in step by hand and drifted: 17 of defaults.json's values disagreed with the game,
      # and since generate.mjs quotes them to the model as ground truth, every generated level came
      # out with a fraction of the intended food. Nothing noticed, because nothing compared them.
      - name: Check the derived files still match game.js
        run: node scripts/sync-params.mjs --check
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Smoke-test the generation pipeline (mock LLM, no API key)
        run: |
          node scripts/generate.mjs --mode daily --mock fixtures/mock-response.txt
          node scripts/validate-all.mjs
