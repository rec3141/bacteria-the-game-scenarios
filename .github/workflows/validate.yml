name: Validate scenarios
on:
  workflow_dispatch:
  push:
    paths: ['scenarios/**', 'scripts/**']
  pull_request:
    paths: ['scenarios/**', 'scripts/**']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/validate-all.mjs
