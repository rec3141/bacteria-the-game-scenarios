name: Daily scenario
on:
  schedule:
    - cron: '17 12 * * *'   # 12:17 UTC daily
  workflow_dispatch:
permissions:
  contents: write
# Never let two publishing runs generate at the same time. publish.sh survives a race,
# but serialising here also keeps generate.mjs's novelty prompt accurate: it reads the
# committed scenarios/, so a concurrent run would be invisible to it.
concurrency:
  group: publish-scenarios
  cancel-in-progress: false
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate today's scenario
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.mjs --mode daily
      - name: Validate
        run: node scripts/validate-all.mjs
      # Straight to main -- no PR. The validate step above is the gate, and it runs the
      # same validator the game itself runs. See the header of scripts/publish.sh.
      - name: Publish
        run: scripts/publish.sh "Daily scenario ($(date +%Y-%m-%d))" "${{ steps.gen.outputs.scenario_id }}"
