name: Daily scenario
on:
  schedule:
    - cron: '17 12 * * *'   # 12:17 UTC daily
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate today's scenario
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.mjs --mode daily
      - name: Validate
        run: node scripts/validate-all.mjs
      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "scenario-bot"
          git config user.email "scenario-bot@users.noreply.github.com"
          branch="daily/$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$branch"
          git add scenarios/ index.json
          git commit -m "Daily AI-generated scenario"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "Daily scenario ($(date +%Y-%m-%d))" \
            --body "Auto-generated daily scenario. Review the mini-lesson and parameters before merging."
