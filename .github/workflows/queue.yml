name: Player-submitted DOIs
# Players submit a paper from inside the game, which appends it to a public JSON queue on
# bacteria.cryomics.org. We poll that queue rather than having the site push to us, so the web
# server needs no GitHub credential at all -- see the header of scripts/queue.mjs.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: publish-scenarios
  cancel-in-progress: false
jobs:
  drain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build any newly submitted DOIs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/queue.mjs > pending.tsv
          while IFS=$'\t' read -r doi id credit; do
            [ -n "$doi" ] || continue
            echo "::group::$id"
            # Per DOI, not per run: one paper Crossref cannot resolve must not strand everyone
            # queued behind it. A failure writes nothing, so the entry simply stays pending and
            # is retried next poll until queue.mjs ages it out.
            # --credit is the optional name the submitter asked to be credited under; it is data,
            # passed as an argv element, and never reaches a shell.
            if node scripts/generate.mjs --mode doi --doi "$doi" --credit "$credit" 2> >(tee /tmp/gen.err >&2) && node scripts/validate-all.mjs; then
              scripts/publish.sh "Scenario from a player-submitted paper" "$id"
            else
              # Record it, or this paper is retried every 15 minutes for a day: nothing was written,
              # so the "has it been built?" check says no on every poll and each retry costs two
              # model calls. Two strikes and the poller leaves it alone.
              echo "::warning::could not build a scenario from $doi"
              node scripts/record-failure.mjs "$doi" "$id" "$(tail -1 /tmp/gen.err 2>/dev/null)"
              scripts/publish.sh "Record a paper that could not be built"
            fi
            echo "::endgroup::"
          done < pending.tsv
