name: Player-submitted DOIs
# Players submit a paper from inside the game, which appends it to a public JSON queue on
# bacteria.cryomics.org. We poll that queue rather than having the site push to us, so the web
# server needs no GitHub credential at all -- see the header of scripts/queue.mjs.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: publish-scenarios
  cancel-in-progress: false
jobs:
  drain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build any newly submitted DOIs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/queue.mjs > pending.tsv
          while IFS=$'\t' read -r mode id payload credit; do
            [ -n "$mode" ] || continue
            echo "::group::$id"
            # One request, not per run: a submission that cannot be built must not strand everyone
            # queued behind it. A failure writes nothing, so the entry simply stays pending and is
            # retried next poll until queue.mjs ages it out. Everything below is passed as an argv
            # element (never interpolated into the shell): a DOI, a base64 terrain, a credit name.
            if [ "$mode" = "terrain" ]; then
              gen=(node scripts/generate.mjs --mode terrain --terrain-b64 "$payload" --id "$id" --credit "$credit")
              subject="Scenario built around a designed terrain"
            else
              gen=(node scripts/generate.mjs --mode doi --doi "$payload" --credit "$credit")
              subject="Scenario from a player-submitted paper"
            fi
            if "${gen[@]}" 2> >(tee /tmp/gen.err >&2) && node scripts/validate-all.mjs; then
              scripts/publish.sh "$subject" "$id"
            else
              # Record it, or this request is retried every 15 minutes for a day: nothing was written,
              # so the "has it been built?" check says no on every poll and each retry costs two model
              # calls. Two strikes and the poller leaves it alone. Keyed by id, so terrain and DOI
              # failures both land in failures.json the same way.
              echo "::warning::could not build $id"
              node scripts/record-failure.mjs "$id" "$id" "$(tail -1 /tmp/gen.err 2>/dev/null)"
              scripts/publish.sh "Record a request that could not be built"
            fi
            echo "::endgroup::"
          done < pending.tsv
