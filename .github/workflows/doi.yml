name: DOI scenario
# One specific paper, on demand. Players do NOT come through here any more — they submit from inside
# the game and queue.yml picks it up (no GitHub account required, which was the whole point). This is
# the manual/admin path: run it yourself, or POST a repository_dispatch from a backend.
#
# There used to be a third trigger: a player opening an issue whose body contained "DOI:". It is gone
# because it still asked for a GitHub account, so it was strictly worse than the in-game form for the
# people it was meant to serve — and it was the one untrusted input in this workflow, which made every
# value here something to handle at arm's length.
on:
  workflow_dispatch:
    inputs:
      doi:
        description: 'DOI to seed a level from (e.g. 10.1126/science.1195979)'
        required: true
  repository_dispatch:
    types: [doi-submission]     # a backend may POST {event_type:"doi-submission", client_payload:{doi}}
permissions:
  contents: write
concurrency:
  group: publish-scenarios
  cancel-in-progress: false
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Extract DOI
        id: doi
        env:
          # Through env rather than inline ${{ }}: a repository_dispatch payload is supplied by whoever
          # holds a token, not necessarily by us, and inline expansion would paste it into the shell as
          # code. generate.mjs validates the shape properly; this just keeps it out of the interpreter.
          EVENT: ${{ github.event_name }}
          INPUT_DOI: ${{ github.event.inputs.doi }}
          PAYLOAD_DOI: ${{ github.event.client_payload.doi }}
        run: |
          case "$EVENT" in
            workflow_dispatch)    doi="$INPUT_DOI" ;;
            repository_dispatch)  doi="$PAYLOAD_DOI" ;;
          esac
          if [ -z "$doi" ]; then echo "no DOI found"; exit 1; fi
          echo "value=$doi" >> "$GITHUB_OUTPUT"
      - name: Resolve + generate from DOI
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DOI: ${{ steps.doi.outputs.value }}
        run: node scripts/generate.mjs --mode doi --doi "$DOI"
      - name: Validate
        run: node scripts/validate-all.mjs
      - name: Publish
        run: scripts/publish.sh "Scenario seeded from a submitted DOI" "${{ steps.gen.outputs.scenario_id }}"
