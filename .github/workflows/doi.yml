name: DOI scenario
on:
  workflow_dispatch:
    inputs:
      doi:
        description: 'DOI to seed a level from (e.g. 10.1126/science.1195979)'
        required: true
  repository_dispatch:
    types: [doi-submission]     # a backend may POST {event_type:"doi-submission", client_payload:{doi}}
  issues:
    types: [opened]            # or a player opens an issue whose body contains "DOI: 10...."
permissions:
  contents: write
  issues: write
concurrency:
  group: publish-scenarios
  cancel-in-progress: false
jobs:
  generate:
    # only run the issue path when the body actually carries a DOI marker
    if: github.event_name != 'issues' || contains(github.event.issue.body, 'DOI:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Extract DOI
        id: doi
        env:
          # via env, never inline ${{ }} in run: — an issue body is untrusted and would be a shell-injection vector
          EVENT: ${{ github.event_name }}
          INPUT_DOI: ${{ github.event.inputs.doi }}
          PAYLOAD_DOI: ${{ github.event.client_payload.doi }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          case "$EVENT" in
            workflow_dispatch)    doi="$INPUT_DOI" ;;
            repository_dispatch)  doi="$PAYLOAD_DOI" ;;
            issues)               doi=$(printf '%s' "$ISSUE_BODY" | grep -oiE '10\.[0-9]{4,9}/[^[:space:]]+' | head -1) ;;
          esac
          if [ -z "$doi" ]; then echo "no DOI found"; exit 1; fi
          echo "value=$doi" >> "$GITHUB_OUTPUT"
      - name: Resolve + generate from DOI
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Through env for the same reason the extract step above uses it: this value came
          # out of an issue body, and inline ${{ }} would paste it into the shell as CODE.
          DOI: ${{ steps.doi.outputs.value }}
        run: node scripts/generate.mjs --mode doi --doi "$DOI"
      - name: Validate
        run: node scripts/validate-all.mjs
      - name: Publish
        run: scripts/publish.sh "Scenario seeded from a submitted DOI" "${{ steps.gen.outputs.scenario_id }}"
      # The submitter used to wait on a human merging a PR. Now the level is live the moment
      # this step runs, so hand them the link that actually plays it and close the issue.
      - name: Reply to the submitting issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SCENARIO_ID: ${{ steps.gen.outputs.scenario_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Thanks! Your paper is now a playable level: https://bacteria.cryomics.org/?scenario=$SCENARIO_ID"
          gh issue close "$ISSUE_NUMBER"
